{{- /* architecture shortcode: centered styled pre block for ASCII diagrams */ -}}
<div class="shortcode-architecture" style="margin: 1.5em 0; display: flex; justify-content: center;">
  <pre style="background-color: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 1.5em 2em; font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace; font-size: 0.85em; line-height: 1.5; overflow-x: auto; max-width: 100%; border: 1px solid #313244; margin: 0;">{{ .Inner }}</pre>
</div>
